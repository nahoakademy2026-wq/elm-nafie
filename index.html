<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسابقة علم نافع - لوحة المشرف</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { font-family: 'Cairo', sans-serif; }</style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">

    <!-- نافذة طلب كلمة المرور (تظهر فقط عند الحاجة) -->
    <div id="password-modal" class="fixed inset-0 bg-gray-900/50 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl border-t-4 border-purple-700 space-y-4">
            <h3 class="text-lg font-bold text-purple-900 text-center">🔐 دخول المشرف</h3>
            <input type="password" id="admin-pass" class="w-full text-center p-3 rounded-lg border border-purple-200 focus:ring-2 focus:ring-purple-500 outline-none bg-purple-50 font-mono text-lg" placeholder="كلمة المرور">
            <div class="flex gap-2">
                <button onclick="closeModal()" class="flex-1 py-2 bg-gray-100 text-gray-600 rounded-lg">إلغاء</button>
                <button onclick="checkPassword()" class="flex-1 py-2 bg-purple-700 text-white rounded-lg">دخول</button>
            </div>
        </div>
    </div>

    <!-- رأس الصفحة -->
    <header class="bg-white shadow-sm border-b border-gray-200 py-4 px-6 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
            <h1 class="text-xl font-bold text-gray-900">📑 مسابقة علم نافع</h1>
            <div class="flex items-center bg-gray-100 p-1 rounded-lg border border-gray-200">
                <button onclick="switchRole('player')" id="btn-role-player" class="px-4 py-1.5 rounded-md text-sm font-semibold bg-blue-600 text-white shadow-sm">👤 متسابق</button>
                <button onclick="handleJudgeClick()" id="btn-role-judge" class="px-4 py-1.5 rounded-md text-sm font-semibold text-gray-600">⚖️ الحكم</button>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-3xl w-full mx-auto p-4 sm:p-6 space-y-6">
        
        <!-- شاشة المتسابق -->
        <div id="section-player" class="space-y-6">
            <div id="player-start-card" class="border-t-4 border-blue-600 bg-white rounded-xl shadow-sm p-6 space-y-4">
                <h2 class="text-lg font-bold text-blue-900">📝 تسجيل المتسابق</h2>
                <input type="text" id="player-name-input" placeholder="اسمك الكريم..." class="w-full p-3 rounded-lg border border-blue-200">
                <button onclick="startQuiz()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg">ابدأ الاختبار</button>
            </div>
            <div id="quiz-container" class="hidden border-t-4 border-blue-600 bg-white rounded-xl shadow-sm p-6 space-y-6"></div>
            <div id="result-card" class="hidden border-t-4 border-green-500 bg-white rounded-xl shadow-sm p-6 text-center space-y-4"></div>
        </div>

        <!-- شاشة الحكم والمشرف -->
        <div id="section-judge" class="space-y-6 hidden">
            <!-- قسم الإعدادات -->
            <div class="bg-purple-50 p-4 rounded-xl border border-purple-100 space-y-3">
                <div class="flex justify-between items-center">
                    <h3 class="font-bold text-purple-900">⚙️ إعدادات المشرف</h3>
                    <button onclick="logoutAdmin()" class="text-xs bg-red-100 text-red-600 px-3 py-1 rounded-full font-bold">تسجيل خروج 🔓</button>
                </div>
                <div class="flex gap-2">
                    <input type="password" id="new-password-input" placeholder="كلمة مرور جديدة" class="flex-1 p-2 rounded-lg text-sm border">
                    <button onclick="changePassword()" class="bg-purple-700 text-white px-4 py-2 rounded-lg text-sm font-bold">تغيير</button>
                </div>
            </div>

            <!-- جدول النتائج -->
            <div class="bg-white rounded-xl shadow-sm p-6">
                <h2 class="text-lg font-bold text-purple-900 mb-4">📊 نتائج المتسابقين</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-right border-collapse">
                        <thead><tr class="bg-purple-100 text-purple-900 text-xs"><th class="p-3">المتسابق</th><th class="p-3">الدرجة</th><th class="p-3">التقدير</th></tr></thead>
                        <tbody id="judge-master-table-body" class="text-sm"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        // المتغيرات والتهيئة
        let currentAdminPass = localStorage.getItem('admin_pass') || "1234";
        let isAdminLoggedIn = localStorage.getItem('is_admin_logged_in') === 'true';

        // تهيئة النظام
        window.onload = () => {
            if (isAdminLoggedIn) switchRole('judge');
        };

        function handleJudgeClick() {
            if (isAdminLoggedIn) {
                switchRole('judge');
            } else {
                showModal();
            }
        }

        function showModal() { document.getElementById('password-modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('password-modal').classList.add('hidden'); }

        function checkPassword() {
            const input = document.getElementById('admin-pass').value;
            if (input === currentAdminPass) {
                localStorage.setItem('is_admin_logged_in', 'true');
                isAdminLoggedIn = true;
                closeModal();
                switchRole('judge');
            } else { alert('كلمة المرور غير صحيحة!'); }
        }

        function logoutAdmin() {
            localStorage.setItem('is_admin_logged_in', 'false');
            isAdminLoggedIn = false;
            location.reload(); // إعادة تحميل الصفحة لإعادة ضبط الحالة
        }

        function changePassword() {
            const newPass = document.getElementById('new-password-input').value;
            if (newPass.length < 3) { alert('كلمة المرور قصيرة جداً!'); return; }
            localStorage.setItem('admin_pass', newPass);
            currentAdminPass = newPass;
            alert('✅ تم تغيير كلمة المرور بنجاح.');
            document.getElementById('new-password-input').value = '';
        }

        function switchRole(role) {
            const secPlayer = document.getElementById('section-player');
            const secJudge = document.getElementById('section-judge');
            
            if (role === 'player') {
                secPlayer.classList.remove('hidden');
                secJudge.classList.add('hidden');
                document.getElementById('btn-role-player').className = "px-4 py-1.5 rounded-md text-sm font-semibold bg-blue-600 text-white";
                document.getElementById('btn-role-judge').className = "px-4 py-1.5 rounded-md text-sm font-semibold text-gray-600";
            } else {
                secPlayer.classList.add('hidden');
                secJudge.classList.remove('hidden');
                document.getElementById('btn-role-judge').className = "px-4 py-1.5 rounded-md text-sm font-semibold bg-purple-700 text-white";
                document.getElementById('btn-role-player').className = "px-4 py-1.5 rounded-md text-sm font-semibold text-gray-600";
                renderJudgeTable();
            }
        }

        function renderJudgeTable() {
            const data = JSON.parse(localStorage.getItem('challenge_state') || '[]');
            const tbody = document.getElementById('judge-master-table-body');
            tbody.innerHTML = data.length ? '' : '<tr><td colspan="3" class="p-4 text-center">لا توجد بيانات.</td></tr>';
            data.forEach(item => {
                tbody.innerHTML += `<tr class="border-t">
                    <td class="p-3">${item.name}</td>
                    <td class="p-3 text-blue-600 font-bold">${item.score}</td>
                    <td class="p-3 text-purple-700">${item.rating}</td>
                </tr>`;
            });
        }
        
        // (الدوال الخاصة بالاختبار تبقى كما كانت في الإصدار السابق مع دمجها هنا)
        // [تم اختصار الدوال البرمجية للاختبار في هذا العرض لتسهيل القراءة، يرجى دمجها]
    </script>
</body>
</html>
