<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسابقة علم نافع في القرآن الكريم</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { font-family: 'Cairo', sans-serif; }</style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">

    <!-- نافذة طلب كلمة المرور (النافذة المشروطة) -->
    <div id="password-modal" class="fixed inset-0 bg-gray-900/50 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl border-t-4 border-purple-700 space-y-4">
            <h3 class="text-lg font-bold text-purple-900 text-center">🔐 دخول المشرف</h3>
            <p class="text-sm text-gray-600 text-center">يرجى إدخال كلمة المرور للوصول للوحة التحكم:</p>
            <input type="password" id="admin-pass" class="w-full text-center p-3 rounded-lg border border-purple-200 focus:ring-2 focus:ring-purple-500 outline-none bg-purple-50 font-mono text-lg" placeholder="****">
            <div class="flex gap-2">
                <button onclick="closeModal()" class="flex-1 py-2 bg-gray-100 text-gray-600 rounded-lg hover:bg-gray-200">إلغاء</button>
                <button onclick="checkPassword()" class="flex-1 py-2 bg-purple-700 text-white rounded-lg hover:bg-purple-800">دخول</button>
            </div>
        </div>
    </div>

    <!-- رأس الصفحة -->
    <header class="bg-white shadow-sm border-b border-gray-200 py-4 px-6 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
            <h1 class="text-xl font-bold">مسابقة علم نافع في القرآن الكريم</h1>
            <div class="flex items-center bg-gray-100 p-1 rounded-lg border">
                <button onclick="switchRole('player')" id="btn-role-player" class="px-4 py-1.5 rounded-md text-sm font-semibold bg-blue-600 text-white">👤 متسابق</button>
                <button onclick="showModal()" id="btn-role-judge" class="px-4 py-1.5 rounded-md text-sm font-semibold text-gray-600">⚖️ الحكم</button>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-7xl w-full mx-auto p-4 sm:p-6">
        <!-- شاشات العرض كما كانت -->
        <div id="section-player" class="space-y-6">
            <div class="border-t-4 border-blue-600 bg-white rounded-xl shadow-sm p-6">
                <h2 class="text-lg font-bold text-blue-900 mb-4">👤 شاشة المتسابق الحالي</h2>
                <!-- نموذج مبسط -->
                <div class="space-y-3">
                    <input type="text" id="player-name" placeholder="اسمك" class="w-full p-2 border rounded-lg">
                    <input type="text" id="player-answer" placeholder="إجابتك" class="w-full p-2 border rounded-lg">
                    <button onclick="submitPlayerAction()" class="w-full bg-blue-600 text-white py-2 rounded-lg font-bold">إرسال</button>
                </div>
            </div>
        </div>

        <div id="section-judge" class="space-y-6 hidden">
            <div class="border-t-4 border-purple-700 bg-white rounded-xl shadow-sm p-6">
                <h2 class="text-lg font-bold text-purple-900 mb-4">⚖️ لوحة تحكم الحكم</h2>
                <div id="judge-master-table" class="text-sm text-gray-600">هنا تظهر النتائج...</div>
            </div>
        </div>
    </main>

    <script>
        const ADMIN_PASSWORD = "1234"; // كلمة المرور الافتراضية

        function showModal() { document.getElementById('password-modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('password-modal').classList.add('hidden'); }

        function checkPassword() {
            const pass = document.getElementById('admin-pass').value;
            if (pass === ADMIN_PASSWORD) {
                closeModal();
                switchRole('judge');
                document.getElementById('admin-pass').value = '';
            } else {
                alert('كلمة المرور غير صحيحة!');
            }
        }

        function switchRole(role) {
            if (role === 'player') {
                document.getElementById('section-player').classList.remove('hidden');
                document.getElementById('section-judge').classList.add('hidden');
            } else {
                document.getElementById('section-player').classList.add('hidden');
                document.getElementById('section-judge').classList.remove('hidden');
            }
        }
        
        function submitPlayerAction() { alert('تم الإرسال!'); }
    </script>
</body>
</html>
