<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسابقة علم نافع في القرآن الكريم - مسار المتسابق</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; }
        .confetti { animation: firework 0.6s infinite alternate; }
        @keyframes firework { 0% { transform: scale(1); } 100% { transform: scale(1.03); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col justify-between">

    <!-- شريط علوي مبسط وخالٍ تماماً من أزرار الإشراف أو الترس تلافياً للتشتيت -->
    <header class="bg-white shadow-sm p-4 border-b border-slate-100 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center px-4">
            <h1 class="text-xl sm:text-2xl font-bold text-slate-800 flex items-center gap-2 select-none">
                <i class="fas fa-book-open text-blue-600"></i> مسابقة علم نافع في القرآن الكريم
            </h1>
            <span class="text-xs font-bold bg-blue-100 text-blue-700 px-3 py-1 rounded-lg">مسار المتسابق الآمن</span>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 flex-grow flex items-center justify-center">
        
        <!-- 1. واجهة تسجيل اسم الطالب البدائية -->
        <div id="student-login-view" class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100 w-full max-w-md text-center">
            <i class="fas fa-user-circle text-5xl text-blue-500 mb-4"></i>
            <h2 class="text-lg font-bold mb-6 text-slate-700">تسجيل اسم المتسابق الكريم</h2>
            <input type="text" id="student-name-input" placeholder="أدخل اسمك الثلاثي هنا..." class="w-full p-3 border border-slate-200 rounded-xl mb-4 text-center text-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button onclick="startStudentQuiz()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 px-6 rounded-xl transition shadow-md">
                بدء الاختبار الآن <i class="fas fa-play text-xs mr-1"></i>
            </button>
        </div>

        <!-- 2. واجهة المسابقة والأسئلة والتفاعل -->
        <div id="quiz-view" class="hidden bg-white p-6 sm:p-8 rounded-2xl shadow-sm border border-slate-100 w-full max-w-2xl">
            <div class="flex justify-between items-center mb-6 border-b pb-4">
                <span id="quiz-player-name" class="font-bold text-blue-700 bg-blue-50 px-4 py-1.5 rounded-full text-sm"></span>
                <span id="quiz-score" class="text-amber-700 font-bold bg-amber-50 px-4 py-1.5 rounded-full text-sm">الدرجة الحالية: 0</span>
            </div>
            <div id="quiz-content">
                <div class="bg-slate-50 p-6 rounded-xl mb-6 border-none">
                    <span id="question-number" class="text-xs font-bold text-blue-500 block mb-2 tracking-wide"></span>
                    <p id="question-text" class="text-lg sm:text-xl font-bold text-slate-800 text-right leading-relaxed"></p>
                </div>
                <div id="feedback-area" class="hidden p-4 rounded-xl mb-5 text-center font-bold text-lg transition-all"></div>
                <div id="options-container" class="grid grid-cols-1 gap-3"></div>
                <button id="next-q-btn" onclick="executeNextQuestionStep()" class="hidden mt-6 w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-3.5 px-6 rounded-xl transition text-center shadow-md">
                    <span id="next-btn-text">الانتقال للخطوة التالية</span> <i class="fas fa-chevron-left text-xs mr-1"></i>
                </button>
            </div>
        </div>

        <!-- 3. بطاقة النتيجة والشهادة التكيفية مع زر المشاركة المرن المحسوب لحظياً -->
        <div id="result-view" class="hidden bg-white p-8 rounded-2xl shadow-sm border border-slate-100 w-full max-w-md text-center">
            <div id="badge-container"></div>
            <h2 id="result-title" class="text-2xl font-bold mb-2 text-slate-800"></h2>
            <p id="result-subtitle" class="text-slate-500 mb-6"></p>
            
            <div class="bg-slate-50 p-6 rounded-2xl mb-6 border border-slate-100 text-right space-y-3">
                <div class="flex justify-between border-b pb-2">
                    <span class="text-slate-500 text-sm">اسم المتسابق:</span>
                    <span id="res-card-name" class="font-bold text-slate-800 text-sm"></span>
                </div>
                <div class="flex justify-between border-b pb-2">
                    <span class="text-slate-500 text-sm">الإجابات الصحيحة:</span>
                    <span id="res-card-count" class="font-bold text-slate-800 text-sm"></span>
                </div>
                <div class="flex justify-between border-b pb-2">
                    <span class="text-slate-500 text-sm">النسبة المئوية:</span>
                    <span id="res-card-percent" class="font-bold text-blue-600 text-base sm:text-lg"></span>
                </div>
                <div class="flex justify-between pt-1">
                    <span class="text-slate-500 text-sm">التقدير العام:</span>
                    <span id="res-card-grade" class="font-extrabold text-base sm:text-xl"></span>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-2">
                <button onclick="restartQuizProcess()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl transition text-sm shadow-sm flex items-center justify-center gap-2">
                    <i class="fas fa-redo-alt"></i> إعادة المحاولة
                </button>
                <button onclick="copyQuizResultReport()" class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-xl transition text-sm shadow-sm flex items-center justify-center gap-2">
                    <i class="fas fa-share-alt"></i> مشاركة النتيجة 🔗
                </button>
            </div>
        </div>

    </main>

    <footer class="bg-white border-t border-slate-100 p-4 text-center">
        <p class="text-xs text-slate-400">حقوق الطبع محفوظة لبرنامج مسابقة علم نافع في القرآن الكريم &copy; 2026</p>
    </footer>

    <script>
        const firebaseConfig = { databaseURL: "https://elm-nafie-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const rootRef = db.ref("/artifacts/elm-nafie/public/data/states/challenge_state/individual_results");

        let pName = "";
        let currentQIdx = 0;
        let score = 0;
        let correctCount = 0;
        let isAnsweringBlocked = false;

        const quizQuestions = [
            { q: "ما إعراب كلمة 'طلباً' في جملة: 'ذاكرتُ طلباً للنجاح'؟", a: ["مفعول لأجله", "حال منصوب", "مفعول به", "تمييز منصوب"], correct: 0 },
            { q: "الاسم المنصوب الذي يبين علة وقوع الفعل ويأتي جواباً لـ (لماذا) هو:", a: ["المفعول المطلق", "المفعول لأجله", "المفعول فيه", "الحال"], correct: 1 },
            { q: "ورد في النص القرآني اللفظ 'مسرعاً'، اللفظ المظلل يعرب عادة في باب المنصوبات بصفته:", a: ["تمييزاً دالاً على الذات", "مفعولاً به صريحاً", "حالاً منصوبة تبين الهيئة", "صفة مشبهة تتبع ما قبلها"], correct: 2 }
        ];

        const positivePhrases = ["أحسنت يا بطل! 🌟", "إجابة رائعة 👏", "واصل التميز ⭐", "عبقري وذكي جداً! 🎯"];
        const encouragePhrases = ["لا بأس، خيرها في غيرها 🌷", "حاول مرة أخرى، فأنت تتقدم خطوة خطوة ⭐", "الاجتهاد طريق التعلم 💡"];

        function startStudentQuiz() {
            const nameInput = document.getElementById("student-name-input").value.trim();
            if (!nameInput) return alert("فضلاً أدخل اسمك الكريم أولاً للانضمام للمسابقة");
            
            pName = nameInput;
            currentQIdx = 0;
            score = 0;
            correctCount = 0;
            isAnsweringBlocked = false;

            document.getElementById("quiz-player-name").innerText = `المتسابق: ${pName}`;
            document.getElementById("quiz-score").innerText = `الدرجة الحالية: 0`;
            
            document.getElementById("student-login-view").classList.add("hidden");
            document.getElementById("quiz-view").classList.remove("hidden");
            showQuestion();
        }

        function showQuestion() {
            isAnsweringBlocked = false;
            document.getElementById("feedback-area").classList.add("hidden");
            document.getElementById("next-q-btn").classList.add("hidden");
            const q = quizQuestions[currentQIdx];
            document.getElementById("question-number").innerText = `السؤال ${currentQIdx + 1} من ${quizQuestions.length}`;
            document.getElementById("question-text").innerText = q.q;

            if (currentQIdx === quizQuestions.length - 1) {
                document.getElementById("next-btn-text").innerText = "الانتقال لمشاهدة النتيجة 🎯";
            } else {
                document.getElementById("next-btn-text").innerText = "الانتقال للسؤال التالي";
            }

            let html = "";
            q.a.forEach((opt, idx) => {
                html += `<button id="opt-${idx}" onclick="handleAnswerSelection(${idx})" class="w-full text-right p-4 rounded-xl border border-slate-200 hover:border-blue-400 hover:bg-slate-50 transition font-medium text-slate-700 flex items-center gap-3 outline-none">
                    <span id="bullet-${idx}" class="w-8 h-8 rounded-full bg-slate-100 text-slate-500 flex items-center justify-center text-xs font-bold border border-slate-200 transition">${idx + 1}</span>
                    <span class="flex-grow text-sm sm:text-base">${opt}</span>
                </button>`;
            });
            document.getElementById("options-container").innerHTML = html;
        }

        function handleAnswerSelection(selectedIdx) {
            if (isAnsweringBlocked) return;
            isAnsweringBlocked = true;
            const q = quizQuestions[currentQIdx];
            const feedbackDiv = document.getElementById("feedback-area");
            feedbackDiv.classList.remove("hidden");

            if (selectedIdx === q.correct) {
                correctCount++;
                score += 10;
                document.getElementById("quiz-score").innerText = `الدرجة الحالية: ${score}`;
                document.getElementById(`opt-${selectedIdx}`).className = "w-full text-right p-4 rounded-xl border-2 border-green-500 bg-green-50 text-green-800 font-bold flex items-center gap-3";
                document.getElementById(`bullet-${selectedIdx}`).className = "w-8 h-8 rounded-full bg-green-500 text-white flex items-center justify-center text-xs font-bold";
                const randPhrase = positivePhrases[Math.floor(Math.random() * positivePhrases.length)];
                feedbackDiv.className = "p-4 rounded-xl mb-4 text-center font-bold text-base sm:text-lg bg-green-100 text-green-700 confetti";
                feedbackDiv.innerHTML = `<i class="fas fa-star animate-spin"></i> ${randPhrase}`;
            } else {
                document.getElementById(`opt-${selectedIdx}`).className = "w-full text-right p-4 rounded-xl border-2 border-red-500 bg-red-50 text-red-800 font-medium flex items-center gap-3";
                document.getElementById(`bullet-${selectedIdx}`).className = "w-8 h-8 rounded-full bg-red-500 text-white flex items-center justify-center text-xs font-bold";
                document.getElementById(`opt-${q.correct}`).className = "w-full text-right p-4 rounded-xl border-2 border-green-500 bg-green-50 text-green-800 font-bold flex items-center gap-3";
                document.getElementById(`bullet-${q.correct}`).className = "w-8 h-8 rounded-full bg-green-500 text-white flex items-center justify-center text-xs font-bold";
                const randPhrase = encouragePhrases[Math.floor(Math.random() * encouragePhrases.length)];
                feedbackDiv.className = "p-4 rounded-xl mb-4 text-center font-bold text-sm sm:text-base bg-amber-50 text-amber-700";
                feedbackDiv.innerHTML = `<i class="fas fa-lightbulb"></i> ${randPhrase}`;
            }
            document.getElementById("next-q-btn").classList.remove("hidden");
        }

        function executeNextQuestionStep() {
            currentQIdx++;
            if (currentQIdx >= quizQuestions.length) {
                showResultCardImmediately();
            } else {
                showQuestion();
            }
        }

        function showResultCardImmediately() {
            const totalPossible = quizQuestions.length * 10;
            const percent = Math.round((score / totalPossible) * 100);
            
            let grade = "تحتاج محاولة";
            let iconHtml = `<i class="fas fa-heart text-6xl text-rose-400 mb-4 animate-bounce"></i>`;
            let title = "بداية جيدة، واصل التعلم 🌷";
            let subtitle = "الاجتهاد طريق التعلم، حاول مجدداً لتتقدم وتكسب الخبرة.";

            if (percent >= 90) {
                grade = "ممتاز";
                iconHtml = `<i class="fas fa-trophy text-6xl text-amber-500 mb-4 animate-bounce text-yellow-500"></i>`;
                title = "تميز باهر وتفوق قرآنّي مبارك! 🎉";
                subtitle = "أحسنت القراءة والضبط، هنيئاً لك هذا المستوى الرفيع.";
            } else if (percent >= 50) {
                grade = "جيد";
                iconHtml = `<i class="fas fa-star text-6xl text-blue-500 mb-4 animate-bounce"></i>`;
                title = "عمل رائع وطيب جداً ⭐";
                subtitle = "أنت تتطور وتتقدم، استمر في المراجعة لتصل للممتاز.";
            }

            document.getElementById("badge-container").innerHTML = iconHtml;
            document.getElementById("result-title").innerText = title;
            document.getElementById("result-subtitle").innerText = subtitle;
            document.getElementById("res-card-name").innerText = pName;
            document.getElementById("res-card-count").innerText = `${correctCount} من أصل ${quizQuestions.length}`;
            document.getElementById("res-card-percent").innerText = `${percent}%`;
            document.getElementById("res-card-grade").innerText = grade;
            
            const gBadge = document.getElementById("res-card-grade");
            if (percent >= 50) gBadge.className = "font-extrabold text-base sm:text-xl text-green-600";
            else gBadge.className = "font-extrabold text-base sm:text-xl text-red-500";

            document.getElementById("quiz-view").classList.add("hidden");
            document.getElementById("result-view").classList.remove("hidden");

            const now = new Date();
            const timeStr = now.toLocaleTimeString('ar-SA') + " - " + now.toLocaleDateString('ar-SA');
            rootRef.push({
                name: pName,
                score: score,
                totalPossible: totalPossible,
                percent: percent,
                grade: grade,
                timestamp: timeStr
            });
        }

        function copyQuizResultReport() {
            const cardPercentText = document.getElementById("res-card-percent").innerText;
            const percent = parseInt(cardPercentText) || 0;
            const cardName = document.getElementById("res-card-name").innerText;
            const cardCount = document.getElementById("res-card-count").innerText;
            let reportText = "";
            
            if (percent >= 90) {
                reportText = `🏆 تقرير نجاح متميز من مسابقة علم نافع في القرآن الكريم 🏆\n\n🏅 المتسابق: ${cardName}\n✅ الإجابات الصحيحة: ${cardCount}\n📊 النسبة المئوية: ${percent}%\n🌟 التقدير العام: ممتاز\n\n💬 الحمد لله الذي بنعمته تتم الصالحات.. أحسنت يا بطل! 🌟`;
            } else if (percent >= 50) {
                reportText = `✨ تقرير مشاركة من مسابقة علم نافع في القرآن الكريم ✨\n\n👤 المتسابق: ${cardName}\n✅ الإجابات الصحيحة: ${cardCount}\n📊 النسبة المئوية: ${percent}%\n📈 التقدير العام: جيد\n\n💬 جهد رائع وطيب.. واصل التدرب لتصل للقمة! 👏`;
            } else {
                reportText = `📚 تقرير محاولة من مسابقة علم نافع في القرآن الكريم 📚\n\n👤 المتسابق: ${cardName}\n✅ الإجابات الصحيحة: ${cardCount}\n📊 النسبة المئوية: ${percent}%\n📝 التقدير العام: تحتاج محاولة\n\n💬 بداية جيدة.. الاجتهاد طريق التعلم، حاول مجدداً لتتقدم! 💡`;
            }
            
            navigator.clipboard.writeText(reportText).then(() => {
                alert("تم نسخ تقرير نتيجتك التكيفي بنجاح ومطابقته للرموز التعبيرية والعبارات الإيجابية! يمكنك الآن لصقه ومشاركته فوراً 🔗");
            }).catch(() => {
                alert("تقرير نتيجتك: " + reportText);
            });
        }

        function restartQuizProcess() {
            document.getElementById("student-name-input").value = "";
            document.getElementById("result-view").classList.add("hidden");
            document.getElementById("student-login-view").classList.remove("hidden");
        }
    </script>
</body>
</html>
